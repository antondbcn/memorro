<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashCards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════ VIEWS ═══════════════════════════════════════ -->

  <!-- VIEW: Review -->
  <div id="view-review" class="view active">
    <header class="top-bar">
      <span class="app-title">FlashCards</span>
      <span id="review-count" class="badge"></span>
    </header>

    <main class="review-area">
      <!-- Empty state -->
      <div id="review-empty" class="empty-state hidden">
        <div class="empty-icon">🃏</div>
        <p>No hay tarjetas todavía.<br>¡Añade algunas para empezar!</p>
      </div>

      <!-- Waiting state: hay tarjetas, pero ninguna ha vencido aún -->
      <div id="review-waiting" class="empty-state hidden">
        <div class="empty-icon">⏳</div>
        <p>Ninguna tarjeta está lista todavía.<br>Vuelve en unos minutos.</p>
      </div>

      <!-- Card flip container -->
      <div id="card-scene" class="card-scene hidden">
        <div id="card-flipper" class="card-flipper">
          <div class="card-face card-front">
            <p id="card-front-text"></p>
          </div>
          <div class="card-face card-back">
            <p id="card-back-text"></p>
          </div>
        </div>
      </div>

      <!-- Rating buttons -->
      <div id="rating-area" class="rating-area hidden">
        <div class="rating-buttons">
          <button class="btn-rating" data-rating="fail"    aria-label="Fallo">❌</button>
          <button class="btn-rating" data-rating="success" aria-label="Acierto">✅</button>
        </div>
      </div>
    </main>
  </div>

  <!-- VIEW: Edit -->
  <div id="view-edit" class="view hidden">
    <header class="top-bar">
      <span class="app-title">Tarjetas</span>
      <span id="edit-count" class="badge"></span>
    </header>

    <div class="search-bar-wrap">
      <input id="search-input" type="text" class="search-input" placeholder="Filtrar tarjetas…" autocomplete="off" />
    </div>

    <div id="card-list" class="card-list">
      <!-- populated by JS -->
    </div>

    <div id="edit-empty" class="empty-state hidden">
      <div class="empty-icon">🔍</div>
      <p>Sin resultados para ese filtro.</p>
    </div>
  </div>

  <!-- VIEW: Add -->
  <div id="view-add" class="view hidden">
    <header class="top-bar">
      <span class="app-title">Nueva tarjeta</span>
    </header>

    <form id="add-form" class="card-form" onsubmit="return false;">
      <label class="form-label" for="add-front">Frente</label>
      <textarea id="add-front" class="form-textarea" placeholder="Escribe el frente…" rows="4"></textarea>

      <label class="form-label" for="add-back">Dorso</label>
      <textarea id="add-back" class="form-textarea" placeholder="Escribe el dorso…" rows="4"></textarea>

      <label class="toggle-label">
        <div class="toggle-wrap">
          <input id="add-double" type="checkbox" checked />
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </div>
        <span>Doble (genera frente→dorso y dorso→frente)</span>
      </label>

      <button id="btn-add-save" class="btn-primary">Añadir tarjeta</button>
      <p id="add-feedback" class="form-feedback hidden"></p>
    </form>
  </div>

  <!-- ══════════════════════════════════ MODAL: Edit Card ══════════════════════════════════ -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Editar tarjeta</span>
        <button id="btn-modal-close" class="btn-icon">✕</button>
      </div>

      <label class="form-label" for="edit-front">Frente</label>
      <textarea id="edit-front" class="form-textarea" rows="4"></textarea>

      <label class="form-label" for="edit-back">Dorso</label>
      <textarea id="edit-back" class="form-textarea" rows="4"></textarea>

      <div class="modal-actions">
        <button id="btn-modal-delete" class="btn-danger">Eliminar</button>
        <button id="btn-modal-save" class="btn-primary">Guardar</button>
      </div>
      <p id="edit-feedback" class="form-feedback hidden"></p>
    </div>
  </div>

  <!-- ═══════════════════════════════════ BOTTOM NAV ═══════════════════════════════════════ -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="review">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
      </svg>
      <span>Repasar</span>
    </button>
    <button class="nav-btn" data-view="edit">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      <span>Editar</span>
    </button>
    <button class="nav-btn" data-view="add">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <span>Añadir</span>
    </button>
  </nav>

  <!-- Firebase SDK -->
  <script type="module" src="app.js"></script>
</body>
</html>
